<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم اللغة الإيزيدية</title>
    <style>
        /* إعدادات الخطوط والتنسيق العام */
                @font-face {
            font-family: 'YezidiFont';
            src: url('NotoSerifYezidi-VariableFont_wght.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
                }
        

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        <header class="main-header">
    <div class="header-logo-right">
        <img src="images/IMG_20260429_211917_056.jpg" alt="Logo">
    </div>

    <div class="header-text-center">
        <h1>برنامج تعلم اللغة الإيزيدية</h1>
        <h2>المرحلة الأولى: تعلّم الحروف</h2>
        <p>اضغط على الحرف للاستماع إلى نطق الصحيح:</p>
    </div>

    <div class="header-logo-left">
        <img src="images/images.jpeg" alt="Flag">
    </div>
</header>


        .section.active {
            display: block;
        }

        /* تصميم كروت الحروف والكلمات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #3498db;
            background-color: #e8f4fd;
        }

        /* تفعيل الخط اليزيدي للرموز */
        .yezidi-text {
            font-family: 'YezidiFont', sans-serif;
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .translation {
            font-size: 14px;
            color: #7f8c8d;
        }

        /* أزرار التنقل */
        .btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #27ae60;
        }

        /* تنسيق قسم الاختبار */
        .quiz-container {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: white;
            border: 2px solid #bdc3c7;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: #3498db;
            background: #f0f7fc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">

    


        
        
 

        <h1>برنامج تعلم اللغة الإيزيدية</h1>

        <div id="letters-section" class="section active">
            <h2>المرحلة الأولى: تعلّم الحروف</h2>
            <p>اضغط على الحرف للاستماع إلى نطقة الصحيح:</p>
            <div class="grid-container" id="letters-grid"></div>
            <button class="btn" onclick="goToWords()">الانتقال إلى الكلمات ←</button>
        </div>

        <div id="words-section" class="section">
            <h2>المرحلة الثانية: تعلّم الكلمات</h2>
            <p>اضغط على الكلمة للاستماع إلى نطقها:</p>
            <div class="grid-container" id="words-grid"></div>
            <button class="btn" onclick="goToQuiz()">الانتقال إلى الاختبار ←</button>
        </div>

        <div id="quiz-section" class="section">
            <h2>المرحلة الثالثة: الاختبار (Test)</h2>
            <div class="quiz-container">
                <p id="quiz-question" style="font-size: 20px; font-weight: bold;"></p>
                <div id="quiz-word" class="yezidi-text" style="font-size: 48px; margin: 20px 0;"></div>
                <div class="options-grid" id="quiz-options"></div>
            </div>
            <div id="quiz-result" style="margin-top: 20px; font-size: 18px; font-weight: bold;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
