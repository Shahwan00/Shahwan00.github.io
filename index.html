<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>موقعي البسيط</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #0077ff;
      color: white;
      padding: 20px;
    }

    .container {
      margin-top: 50px;
    }

    button {
      background-color: #0077ff;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #005bcc;
    }
  </style>
</head>

<body>

  <header>
    <h1>أهلاً بك في موقعي</h1>
  </header>

  <div class="container">
    <p>هذه صفحة ويب بسيطة للمبتدئين.</p>

    <button onclick="showMessage()">
      اضغط هنا
    </button>
  </div>

  <script>
    function showMessage() {
      alert("مرحباً بك!");
    }
  </script>

</body>
</html>
