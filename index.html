<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم اللغة الإيزيدية</title>
    <link rel="stylesheet" href="style.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3516282666099519"
     crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">

        <header class="main-header">
            <div class="header-logo-right">
                <img src="images/IMG_20260429_211917_056.jpg" alt="Logo">
                <div class="logo-subtext">Akademiya Ezidi</div>
            </div>

            <div class="header-text-center">
                <h1>برنامج تعلم اللغة الإيزيدية</h1>
                <h2>المرحلة الأولى: تعلّم الحروف</h2>
                <p>اضغط على الحرف للاستماع إلى النطق الصحيح:</p>
            </div>

            <div class="header-logo-left">
                <img src="images/images.jpeg" alt="Flag">
            </div>
        </header>

        <div id="letters-section" class="section active">
            <div class="grid-container" id="letters-grid"></div>
            <button class="btn" onclick="goToWords()">الانتقال إلى الكلمات ←</button>
        </div>

        <div id="words-section" class="section" style="display:none;">
            <h2>المرحلة الثانية: تعلّم الكلمات</h2>
            <p>اضغط على الكلمة للاستماع إلى نطقها:</p>
            <div class="grid-container" id="words-grid"></div>
            <button class="btn" onclick="goToQuiz()">الانتقال إلى الاختبار ←</button>
        </div>

        <div id="quiz-section" class="section" style="display:none;">
            <h2>المرحلة الثالثة: الاختبار (Test)</h2>
            <div class="quiz-container">
                <p id="quiz-question" style="font-size: 20px; font-weight: bold;"></p>
                <div id="quiz-word" class="yezidi-text" style="font-size: 48px; margin: 20px 0;"></div>
                <div class="options-grid" id="quiz-options"></div>
            </div>
            <div id="quiz-result" style="margin-top: 20px; font-size: 18px; font-weight: bold;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
