<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار متعدد الأسئلة</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: right; }
        .question-container { display: none; }
        .question-container.active { display: block; }
        .feedback { font-weight: bold; margin-top: 15px; font-size: 1.2em; }
        .correct { color: green; }
        .incorrect { color: red; }
    </style>
</head>
<body>

    <h2>صفحة الاختبارات التعليمية</h2>
    <hr>

    <div id="quiz">
        <!-- السؤال الأول -->
        <div class="question-container active" id="q1">
            <h3>السؤال 1:</h3>
            <p>ما هو اسم بيت الأسد؟</p>
            <input type="radio" id="q1_opt1" name="q1" value="وجار" onclick="checkAnswer('q1', 'وجار', 'عرين')">
            <label for="q1_opt1">وجار</label><br>
            <input type="radio" id="q1_opt2" name="q1" value="عرين" onclick="checkAnswer('q1', 'عرين', 'عرين')">
            <label for="q1_opt2">عرين</label><br>
            <input type="radio" id="q1_opt3" name="q1" value="جحر" onclick="checkAnswer('q1', 'جحر', 'عرين')">
            <label for="q1_opt3">جحر</label>
        </div>

        <!-- السؤال الثاني -->
        <div class="question-container" id="q2">
            <h3>السؤال 2:</h3>
            <p>ما هو اسم بيت الأرنب؟</p>
            <input type="radio" id="q2_opt1" name="q2" value="جحر" onclick="checkAnswer('q2', 'جحر', 'جحر')">
            <label for="q2_opt1">جحر</label><br>
            <input type="radio" id="q2_opt2" name="q2" value="عرين" onclick="checkAnswer('q2', 'عرين', 'johr')">
            <label for="q2_opt2">عرين</label><br>
            <input type="radio" id="q2_opt3" name="q2" value="قفص" onclick="checkAnswer('q2', 'قفص', 'johr')">
            <label for="q2_opt3">قفص</label>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>

    <br><br>
    <a href="index.html">العودة للصفحة الرئيسية</a>

    <script>
        function checkAnswer(questionId, selected, correct) {
            var feedbackDiv = document.getElementById('feedback');
            
            if (selected === correct) {
                feedbackDiv.textContent = "إجابة صحيحة!";
                feedbackDiv.className = "feedback correct";
            } else {
                feedbackDiv.textContent = "إجابة خاطئة.";
                feedbackDiv.className = "feedback incorrect";
            }
            
            setTimeout(function() {
                document.getElementById(questionId).classList.remove('active');
                feedbackDiv.textContent = "";
                
                if (questionId === 'q1') {
                    document.getElementById('q2').classList.add('active');
                } else {
                    alert("انتهى الاختبار!");
                    window.location.href = 'index.html';
                }
            }, 1000); 
        }
    </script>
</body>
</html>
